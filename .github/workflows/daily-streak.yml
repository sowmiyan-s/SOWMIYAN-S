name: Daily Contribution Streak

on:
  schedule:
    # Runs at midnight UTC every day
    - cron: '0 0 * * *' 
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Make daily update
        run: |
          # Write the current date to a file to create a change
          echo "Last updated: $(date)" > streak.txt
          
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add, commit, and push
          git add streak.txt
          git commit -m "chore: daily green dot strike update" || echo "No changes to commit"
          git push
